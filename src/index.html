<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>No のーえん No Life</title>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/ui.css">
  <link rel="stylesheet" href="css/weather.css">
  <link rel="stylesheet" href="css/prestige.css">
  <link rel="stylesheet" href="css/modal.css">
</head>

<body>
  <div id="app" class="app">
    <!-- ウィンドウフレーム（レトロ風） -->
    <div class="window-frame">
      <!-- タイトルバー -->
      <div class="title-bar">
        <div class="title-bar__stats">
          <span class="stat stat--level">
            <span class="stat-text">Lv.<span id="hud-level">1</span></span>
            <div id="hud-exp-fill" class="player-exp-fill"></div>
          </span>
          <span class="stat stat--points"><span id="hud-points">0</span>pt</span>
        </div>
        <div class="title-bar__controls">
          <button class="title-bar__btn" id="btn-size-toggle" data-tooltip="2倍サイズ">🔍</button>
          <button class="title-bar__btn" id="btn-version" data-tooltip="バージョン情報">ℹ</button>
          <button class="title-bar__btn" id="btn-minimize">─</button>
          <button class="title-bar__btn title-bar__btn--close" id="btn-close">✕</button>
        </div>
      </div>

      <!-- メインステージ -->
      <div id="stage" class="stage">
        <!-- 背景（空＋地面） -->
        <!-- 収穫エフェクト -->
        <div id="harvest-effect" class="harvest-effect" hidden></div>

        <!-- レベルアップエフェクト -->
        <div id="levelup-effect" class="levelup-effect" hidden>LEVEL UP!</div>

        <!-- 実績解除トースト -->
        <div id="achievement-toast" class="achievement-toast" style="position:absolute; top:80px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.7); border:1px solid #aaa; border-radius:4px; padding:8px 16px; color:#fff; font-size:0.85rem; z-index:9000; pointer-events:none; transition: opacity 0.5s; opacity: 0; display: none; white-space: nowrap; text-align: center;">
          <span id="achievement-toast-desc"></span>
        </div>

        <!-- 非アクティブ時ステータス表示 -->
        <div id="blur-stats" class="blur-stats" hidden>
          <span class="stat stat--level">
            <span class="stat-text">Lv.<span id="blur-level">1</span></span>
            <div id="blur-exp-fill" class="player-exp-fill"></div>
          </span>
          <span class="stat stat--points"><span id="blur-points">0</span>pt</span>
        </div>
      </div>

      <!-- ツールバー -->
      <div class="toolbar">
        <button id="btn-gacha" class="toolbar__btn toolbar__btn--main" data-tooltip="種を入手"><span
            class="gacha-icon"></span></button>
        <button id="btn-inventory" class="toolbar__btn toolbar__btn--main" data-tooltip="作物一覧">📖</button>
        <button id="btn-prestige" class="toolbar__btn toolbar__btn--main" data-tooltip="プレステージ">⭐</button>

        <button id="btn-menu" class="toolbar__btn toolbar__btn--sub" data-tooltip="メニュー">三</button>

        <!-- メニューポップアップ -->
        <div id="menu-popup" class="menu-popup">
          <button id="btn-character" class="toolbar__btn" data-tooltip="キャラ変更">👤</button>
          <button id="btn-achievements" class="toolbar__btn" data-tooltip="実績一覧">🏆</button>
          <button id="btn-bg-toggle" class="toolbar__btn toolbar__btn--toggle" data-tooltip="背景切替">🌤️</button>
          <button id="btn-clock-toggle" class="toolbar__btn" data-tooltip="時計切替">🕒</button>
          <button id="btn-log" class="toolbar__btn" data-tooltip="イベント図鑑">📕</button>
        </div>
      </div>
    </div>

    <!-- イベント図鑑モーダル -->
    <div id="log-modal" class="modal" hidden>
      <div class="modal__content modal__content--log">
        <div class="modal__title">📕 イベント図鑑</div>
        <div id="log-list" class="log-list"></div>
        <div class="modal__actions">
          <button id="btn-log-close" class="btn btn--ghost">閉じる</button>
        </div>
      </div>
    </div>

    <!-- 実績一覧モーダル -->
    <div id="achievement-modal" class="modal" hidden>
      <div class="modal__content modal__content--log">
        <div class="modal__title">🏆 実績一覧</div>
        <div id="achievement-list" style="max-height: 280px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; padding: 4px 0;"></div>
        <div class="modal__actions">
          <button id="btn-achievement-close" class="btn btn--ghost">閉じる</button>
        </div>
      </div>
    </div>

    <!-- キャラクターカスタマイズモーダル -->
    <div id="character-modal" class="modal" hidden>
      <div class="modal__content" style="width: 300px;">
        <div class="modal__title">👤 着せ替え</div>
        <div class="character-preview" style="height: 140px; background: linear-gradient(180deg, #2a3040 0%, #1a2030 100%); border-radius: 8px; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; border: 1px solid #444; overflow: hidden;">
          <canvas id="char-preview-canvas" width="280" height="140" style="display:block;"></canvas>
        </div>
        
        <div class="character-parts" style="display:flex; flex-direction:column; gap:8px;">
          <div>
            <label style="font-size: 0.8rem; color: #aaa;">帽子:</label>
            <select id="char-hat-select" style="width:100%; background: #222; color: #fff; border: 1px solid #555; padding: 6px; border-radius: 4px;">
              <option value="none">なし</option>
              <option value="straw_hat">麦わら帽子</option>
              <option value="cap">赤いキャップ</option>
            </select>
          </div>
          <div style="margin-bottom: 8px;">
            <label style="font-size: 0.8rem; color: #aaa;">アクセサリ:</label>
            <select id="char-acc-select" style="width:100%; background: #222; color: #fff; border: 1px solid #555; padding: 6px; border-radius: 4px;">
              <option value="none">なし</option>
              <option value="watering_can">ジョウロ</option>
            </select>
          </div>
          <div style="display:flex; gap:6px; margin-top: 4px;">
            <button id="btn-char-randomize" class="btn btn--primary" style="flex:1; font-size: 0.8rem; padding: 6px;">🎲 ランダムカラー</button>
            <button id="btn-char-reset-color" class="btn btn--ghost" style="flex:0.6; font-size: 0.8rem; padding: 6px;">↩ リセット</button>
          </div>
          <div style="margin-top: 6px;">
            <div style="display:flex; align-items:center; gap:4px;">
              <button id="btn-char-preset-save" class="btn btn--ghost" style="font-size: 0.7rem; padding: 3px 5px; min-width: 0;" data-tooltip="保存モード">💾</button>
              <button class="char-preset-slot" data-slot="0" style="width:28px; height:28px; border-radius:50%; border:2px solid #555; background:#333; cursor:pointer; font-size:0.65rem; color:#888; display:flex; align-items:center; justify-content:center;">1</button>
              <button class="char-preset-slot" data-slot="1" style="width:28px; height:28px; border-radius:50%; border:2px solid #555; background:#333; cursor:pointer; font-size:0.65rem; color:#888; display:flex; align-items:center; justify-content:center;">2</button>
              <button class="char-preset-slot" data-slot="2" style="width:28px; height:28px; border-radius:50%; border:2px solid #555; background:#333; cursor:pointer; font-size:0.65rem; color:#888; display:flex; align-items:center; justify-content:center;">3</button>
              <button class="char-preset-slot" data-slot="3" style="width:28px; height:28px; border-radius:50%; border:2px solid #555; background:#333; cursor:pointer; font-size:0.65rem; color:#888; display:flex; align-items:center; justify-content:center;">4</button>
              <button class="char-preset-slot" data-slot="4" style="width:28px; height:28px; border-radius:50%; border:2px solid #555; background:#333; cursor:pointer; font-size:0.65rem; color:#888; display:flex; align-items:center; justify-content:center;">5</button>
            </div>
            <div id="preset-mode-label" style="font-size: 0.65rem; color: #666; margin-top: 2px; text-align: center; height: 14px;"></div>
          </div>
        </div>
        
        <div class="modal__actions">
          <button id="btn-character-save" class="btn btn--primary" style="flex:1;">決定</button>
          <button id="btn-character-close" class="btn btn--ghost" style="flex:0.5;">やめる</button>
        </div>
      </div>
    </div>

    <!-- ガチャモーダル -->
    <div id="gacha-modal" class="modal" hidden>
      <div class="modal__content">
        <div class="modal__title">🌱 種を入手</div>
        <div id="gacha-result" class="gacha-result"></div>
        <div class="gacha-qty-row">
          <button id="btn-gacha-prev" class="gacha-qty-arrow">◀</button>
          <span id="gacha-qty-label" class="gacha-qty-label">1個</span>
          <button id="btn-gacha-next" class="gacha-qty-arrow">▶</button>
        </div>
        <div class="modal__actions">
          <button id="btn-gacha-buy" class="btn btn--primary">購入 (100pt)</button>
          <button id="btn-gacha-close" class="btn btn--ghost">閉じる</button>
        </div>
      </div>
    </div>

    <!-- 作物カタログモーダル -->
    <div id="catalog-modal" class="modal" hidden>
      <div class="modal__content modal__content--catalog">
        <div class="modal__title">📖 作物一覧</div>
        <div id="catalog-list" class="catalog-list"></div>
        <div class="modal__actions">
          <button id="btn-catalog-close" class="btn btn--ghost">閉じる</button>
        </div>
      </div>
    </div>

    <!-- プレステージモーダル -->
    <div id="prestige-modal" class="modal" hidden>
      <div class="modal__content modal__content--prestige">
        <div class="modal__title">⭐ プレステージ</div>
        <div class="prestige-info">
          <span class="prestige-currency">💎 <span id="prestige-currency">0</span></span>
          <span class="prestige-count">周回 <span id="prestige-count">0</span>回</span>
        </div>
        <div id="prestige-shop" class="prestige-shop"></div>
        <div class="prestige-footer">
          <button id="btn-prestige-exec" class="btn btn--danger">プレステージ実行</button>
          <button id="btn-prestige-close" class="btn btn--ghost">閉じる</button>
        </div>
      </div>
    </div>

    <!-- プレステージ確認モーダル -->
    <div id="prestige-confirm-modal" class="modal" hidden>
      <div class="modal__content">
        <div class="modal__title">⭐ プレステージ確認</div>
        <div style="text-align: center; margin: 15px 0; line-height: 1.5; font-size: 11px;">
          プレステージを実行しますか？<br><br>
          <span style="color:var(--c-accent); font-size: 13px; font-weight: bold;">💎 獲得通貨: +<span
              id="prestige-confirm-earn">0</span></span><br><br>
          <span style="color:#a098b0; font-size:9px;">⚠️ レベル・ポイント・種がリセットされます<br>（強化内容は保持されます）</span>
        </div>
        <div class="modal__actions">
          <button id="btn-prestige-confirm-yes" class="btn btn--primary">実行する</button>
          <button id="btn-prestige-confirm-no" class="btn btn--ghost">キャンセル</button>
        </div>
      </div>
    </div>

    <!-- バージョン＆設定モーダル -->
    <div id="version-modal" class="modal" hidden>
      <div class="modal__content">
        <div class="modal__title">ℹ バージョン情報</div>
        <div style="padding: 10px 0; border-top: 1px solid rgba(255, 255, 255, 0.1);">
          <div style="font-size: 1.2rem; font-weight: bold; margin-bottom: 5px;">No のーえん No Life</div>
          <div style="font-size: 0.8rem; color: #a098b0; margin-bottom: 15px;">Version 0.4.2</div>
          <div style="font-size: 0.7rem; color: #807890; line-height: 1.5;"></div>
        </div>
        <div class="modal__actions" style="flex-direction: column; gap: 10px;">
          <button id="btn-open-reset" class="btn btn--danger" style="width: 100%;">セーブデータを削除</button>
          <button id="btn-version-close" class="btn btn--ghost" style="width: 100%;">閉じる</button>
        </div>
      </div>
    </div>

    <!-- 確認モーダル -->
    <div id="confirm-modal" class="modal" hidden>
      <div class="modal__content">
        <div class="modal__title">⚠️ 警告</div>
        <div style="text-align: center; margin: 20px 0; line-height: 1.5;">
          本当にセーブデータを<br>完全に削除しますか？<br>
          <span style="color:#ff6060; font-size:0.8em;">(この操作は取り消せません)</span>
        </div>
        <div class="modal__actions">
          <button id="btn-confirm-yes" class="btn btn--danger">削除する</button>
          <button id="btn-confirm-no" class="btn btn--ghost">キャンセル</button>
        </div>
      </div>
    </div>

    <!-- デバッグモーダル -->
    <div id="debug-modal" class="modal" hidden>
      <div class="modal__content">
        <div class="modal__title">🛠 デバッグモード</div>
        <div class="debug-actions" style="display:flex; flex-direction:column; gap:8px; padding-top: 10px;">
          <select id="debug-event-select"
            style="padding: 8px; font-family: inherit; background: rgba(0,0,0,0.5); color: white; border: 1px solid var(--c-border); border-radius: 4px;"></select>
          <button id="btn-debug-trigger-event" class="btn btn--primary">イベント強制発生</button>
          <button id="btn-debug-add-exp" class="btn btn--primary">経験値+1000</button>
          <button id="btn-debug-add-pt" class="btn btn--primary">ポイント+10000</button>
        </div>
        <div class="modal__actions">
          <button id="btn-debug-close" class="btn btn--ghost">閉じる</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>

</html>
